<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; height: 500px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid #ddd; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .bot { background: #e9ecef; color: #333; }
        .input-area { display: flex; padding: 10px; background: #fff; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 5px; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-box" id="chatBox">
        <div class="message bot">Hello How can I help you</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const message = inputField.value.trim();
        if (!message) return;

        const chatBox = document.getElementById('chatBox');
        
        // 1. User ka message screen par dikhana
        chatBox.innerHTML += `<div class="message user">${message}</div>`;
        inputField.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // 2. Flask backend ko request bhejna
        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            
            // 3. Bot ka jawab screen par dikhana
            if (data.response) {
                chatBox.innerHTML += `<div class="message bot">${data.response}</div>`;
            } else {
                chatBox.innerHTML += `<div class="message bot">Error: Something went wrong!</div>`;
            }
        } catch (error) {
            chatBox.innerHTML += `<div class="message bot">Error: Server not connected.</div>`;
        }
        
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
